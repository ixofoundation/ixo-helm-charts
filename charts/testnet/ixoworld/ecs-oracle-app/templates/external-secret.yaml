{{- if and .Values.externalSecret .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "ecs-oracle.fullname" . }}-env
  labels:
    {{- include "ecs-oracle.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ include "ecs-oracle.fullname" . }}-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.vaultPath }}
{{- end }}
