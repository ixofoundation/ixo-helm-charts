apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ixo-supamoto-onboarding-server.fullname" . }}-config
  labels:
    {{- include "ixo-supamoto-onboarding-server.labels" . | nindent 4 }}
data:
  production.yaml: |-
    # -------------------------------------------------------------------------------------------------
    # MATRIX CONFIG
    # -------------------------------------------------------------------------------------------------
    # Where the homeserver's Client-Server API is located. Typically this
    # is where clients would be connecting to in order to send messages.
    homeserverUrl: 'https://testmx.ixo.earth'

    # The id of the only room the bot must join - all other invites will be
    # ignored.
    roomId: '!VRvLFqoWOYeVnJhBUX:testmx.ixo.earth'

    # The URL of the room bot to use for matrix account registration and room management
    roomBotUrl: 'https://rooms.bot.testmx.ixo.earth'

    # The URL of the state bot to use for state management
    stateBotUrl: 'https://state.bot.testmx.ixo.earth'

    # The claims bot used for claim fetching
    claimsBot:
      # The base URL of the claims bot
      url: 'https://claim.bot.testmx.ixo.earth'
      # The access token used to authenticate with the claims bot
      accessToken: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_BOT_CLAIMS_BOT_ACCESS_TOKEN>'

    # -------------------------------------------------------------------------------------------------
    # CLAIM COLLECTION ID CONFIG
    # -------------------------------------------------------------------------------------------------
    # The id for the lead claim collection
    leadCollectionId: '231'
    # The id for the screening claim collection
    screeningCollectionId: '225'
    # The id for the contract claim collection
    contractCollectionId: '226'
    # The id for the onboarding fee claim collection
    onboardingFeeCollectionId: '233'
    # The id for the home visit claim collection
    homeVisitCollectionId: '229'
    # The id for the fuel purchase claim collection
    fuelPurchaseCollectionId: '234'
    # The id for the bag & stove collection claim collection
    bagStoveCollectionId: '230'

    # -------------------------------------------------------------------------------------------------
    # CHAIN CONFIG
    # -------------------------------------------------------------------------------------------------
    # The RPC URL of the chain to query for the claim collection details etc
    rpcUrl: 'https://testnet.ixo.earth/rpc/'

    # The URL of the block sync graphql endpoint
    blockSyncGraphqlUrl: 'https://testnet-blocksync-graphql.ixo.earth/graphql'

    # The DID of the entity that owns the claim collections
    entityDid: 'did:ixo:entity:bba828660334c74beec66f85038ac730'

    # The network to use for the ixo blockchain
    chainNetwork: 'testnet'

    # The URL of the feegrant service to use
    feegrantServiceUrl: 'https://feegrant.testnet.ixo.earth'

    # The API key to use for the feegrant service
    feegrantServiceApiKey: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_BOT_FEEGRANT_API_KEY>'

    # The URL of the remote contexts to use
    remoteContexts:
      - 'https://w3id.org/ixo/context/v1'

    # -------------------------------------------------------------------------------------------------
    # CREDENTIALS CONFIG
    # -------------------------------------------------------------------------------------------------
    # The mnemonic phrase for generating credential signing keys
    credentialsMnemonic: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_BOT_CREDENTIALS_MNEMONIC>'

    # The DID that will be used as the issuer for all credentials
    issuerDid: 'did:ixo:entity:bf042e4f57621516854f9be523ef6850'

    # -------------------------------------------------------------------------------------------------
    # HOUSEHOLD CONFIG
    # -------------------------------------------------------------------------------------------------
    # The household service account owns and signs all household (deed/subscription)
    # entities, and its Matrix account posts household credentials into the entity rooms.
    # The account is provisioned externally; secrets are pulled from Vault.
    householdController:
      # The mnemonic of the household service account (signs entity transactions)
      mnemonic: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_HOUSEHOLD_MNEMONIC>'
      # The Matrix login password of the household service account
      matrixPassword: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_HOUSEHOLD_MATRIX_PASSWORD>'
      # The Matrix 4S recovery passphrase of the household service account
      recoveryPassphrase: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_HOUSEHOLD_RECOVERY_PASSPHRASE>'

    # -------------------------------------------------------------------------------------------------
    # DATABASE CONFIG
    # -------------------------------------------------------------------------------------------------
    # The encryption key for securing sensitive data
    encryptionKey: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_BOT_ENCRYPTION_KEY>'

    # The URL of the database to store the claims and evaluations
    databaseUrl: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_BOT_DATABASE_URL>'

    # Whether to use SSL for the database connection
    databaseUseSsl: true

    # Whether to migrate the database programmatically
    migrateDbProgrammatically: true

    # -------------------------------------------------------------------------------------------------
    # REST API CONFIG
    # -------------------------------------------------------------------------------------------------
    restApi:
      # Set to true to enable the REST API
      enabled: true
      # Port to listen on for the REST API, default is 8080
      port: 8083
      # express trust proxy config for if you are using a reverse proxy
      trustProxy: 1
      # An access token for access to server rest endpoints.
      apiKey: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_API_KEY>'
      # Dedicated bearer token for the USSD service endpoints (/api/v1/customers/pin*).
      # Kept SEPARATE from apiKey so the GraphQL/data key can't drive customer-PIN flows.
      ussdApiKey: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_USSD_API_KEY>'

    # -------------------------------------------------------------------------------------------------
    # CRON CONFIG
    # -------------------------------------------------------------------------------------------------
    cronjob:
      schedule: '*/5 * * * *'

    # -------------------------------------------------------------------------------------------------
    # NOTIFICATIONS CONFIG
    # -------------------------------------------------------------------------------------------------
    # Slack incoming webhook URL used to post server notifications.
    slackWebhookUrl: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_SLACK_WEBHOOK_URL>'

    # The URL of the bids bot (ixo-matrix-bids-bot) — used to query an agent's bids and
    # mark a bid approved when auto-approving agent registration.
    bidBotUrl: 'https://bid.bot.testmx.ixo.earth/'

    # -------------------------------------------------------------------------------------------------
    # UNL Config
    # -------------------------------------------------------------------------------------------------
    unl:
      apiBaseUrl: 'https://api.unl.global'
      apiKey: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_UNL_API_KEY>'

    # -------------------------------------------------------------------------------------------------
    # SUPA PARTNER CONFIG
    # -------------------------------------------------------------------------------------------------
    # The supa partner service account (mirror of householdController for supa partner
    # operations): partner-to-partner token transfers, customer-sale payment claims, and
    # agent bid auto-approval (it must hold a CreateClaimAuthorization meta-grant from the
    # registration collection's admin).
    supaOperatorController:
      # secp256k1 mnemonic of the service account (must hold a CreateClaimAuthorization
      # meta-grant from the registration collection's admin for bid approval).
      mnemonic: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_PARTNER_MNEMONIC>'
      # Matrix access token of the same account (bids bot, claims bot, ed-key room state).
      accessToken: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_PARTNER_ACCESS_TOKEN>'
      # 6-digit PIN decrypting the account's ed25519 signing mnemonic (signs claim VCs).
      matrixPin: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_PARTNER_MATRIX_PIN>'

    supamotoBotUrl: 'https://supamoto.bot.testmx.ixo.earth'

    ucan:
      # Mnemonic deriving the server's ed25519 UCAN signer
      serverMnemonic: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_UCAN_MNEMONIC>'
      # Public hostname of this server -> did:web:<hostname> identity, DID document served
      # at /.well-known/did.json. Blank falls back to the bare did:key identity.
      serviceHostname: 'supamoto-onboarding.testmx.ixo.earth'

    supamotoWorker:
      # Base URL of the supamoto-worker (its UCAN audience is did:web:<this host>)
      url: 'supamoto-worker-testnet.ixo-api.workers.dev'
      # TEMPORARY shared bearer key (the worker's API_KEY secret) while the worker's UCAN
      # middleware is parked; calls switch to `ucan`-identity invocations when it returns
      apiKey: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_WORKER_API_KEY>'

    airtelSms:
      # Gateway endpoint, e.g. https://www.airtel.co.zm/gateway/v1/sendDefaultSms
      url: 'https://www.airtel.co.zm/gateway/v1/sendDefaultSms'
      # The base64 basic-auth credential (the part after 'Basic ')
      authToken: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_AIRTEL_SMS_AUTH_TOKEN>'
      # Airtel account/customer id
      customerId: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_AIRTEL_SMS_CUSTOMER_ID>'
      # The SMS sender header shown to recipients
      senderId: 'SUPAMOTO'
      # Airtel sub-account id (sent in metaData)
      subAccountId: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_AIRTEL_SMS_SUB_ACCOUNT_ID>'

    # HERE Geocoding & Search API key — the reverse-geocode FALLBACK used only when UNL is
    # unavailable (circuit breaker open, unconfigured, or a live call just failed). Leave
    # blank to disable the fallback (UNL-only behavior).
    here:
      apiKey: '<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_ONBOARDING_SERVER_HERE_API_KEY>'