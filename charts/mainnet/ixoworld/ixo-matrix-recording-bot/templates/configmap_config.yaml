apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ixo-matrix-recording-bot.fullname" . }}-config
  labels:
    {{- include "ixo-matrix-recording-bot.labels" . | nindent 4 }}
{{- $cfg := .Values.config | default dict }}
{{- $ecies := $cfg.ecies | default dict }}
{{- $userCreation := $cfg.userCreation | default dict }}
{{- $ucan := $cfg.ucan | default dict }}
{{- $restApi := $cfg.restApi | default dict }}
data:
  production.yaml: |-
    homeserverUrl: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_HOMESERVER_URL>"

    accessToken: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_ACCESS_TOKEN>"
    username: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_USERNAME>"
    password: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_PASSWORD>"

    network: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_NETWORK>"

    # Whether or not to autojoin rooms when invited.
    autoJoin: true

    # Location on disk for where to store various bot information.
    dataPath: "./ixo-matrix-recording-bot-storage"

    # Set to false to disable encryption support. Encrypted data will be stored under dataPath.
    encryption: true

    # Recovery key for restoring encryption keys from server backup
    # Format: Base58 with spaces (e.g., "EsTc LW2K ...")
    recoveryKey: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_RECOVERY_KEY>"

    # REST API config
    ucan:
      mnemonic: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_DID_MNEMONIC>"
      hostname: "recording.bot.mx.ixo.earth"

    # REST API config
    restApi:
      # Set to true to enable the REST API
      enabled: true
      # Port to listen on for the REST API, default is 8080
      port: 8087
      # express trust proxy config for if you are using a reverse proxy
      trustProxy: 1
      # An access token for access to server rest endpoints.
      accessToken: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_ACCESS_TOKEN>"

    # Recordings config
    recordings:
      # Location on disk for where to store recordings.
      outputPath: "./ixo-matrix-recording-bot-storage/recordings"
      # Whether to remove local files after uploading to R2.
      removeLocalFiles: false

    # XAI config
    xai:
      # API key for XAI.
      apiKey: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_XAI_API_KEY>"

    # R2 config
    r2:
      # Account ID for R2.
      accountId: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_R2_ACCOUNT_ID>"
      # Access key ID for R2.
      accessKeyId: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_R2_ACCESS_KEY_ID>"
      # Secret access key for R2.
      secretAccessKey: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_R2_SECRET_ACCESS_KEY>"
      # Bucket for R2.
      bucket: "<path:ixo_core/data/matrix#MATRIX_RECORDING_BOT_R2_BUCKET>"