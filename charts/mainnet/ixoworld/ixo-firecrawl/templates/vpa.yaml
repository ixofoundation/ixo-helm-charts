{{- if .Values.verticalPodAutoscaler.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "ixo-firecrawler.fullname" . }}-api
  labels:
    {{- include "ixo-firecrawler.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ixo-firecrawler.fullname" . }}-api
  updatePolicy:
    updateMode: {{ .Values.verticalPodAutoscaler.updateMode | quote }}
  {{- with .Values.verticalPodAutoscaler.resourcePolicy }}
  resourcePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "ixo-firecrawler.fullname" . }}-mcp
  labels:
    {{- include "ixo-firecrawler.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ixo-firecrawler.fullname" . }}-mcp
  updatePolicy:
    updateMode: {{ .Values.verticalPodAutoscaler.updateMode | quote }}
  {{- with .Values.verticalPodAutoscaler.resourcePolicy }}
  resourcePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "ixo-firecrawler.fullname" . }}-playwright
  labels:
    {{- include "ixo-firecrawler.labels" . | nindent 4 }}
    app.kubernetes.io/component: playwright-service
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ixo-firecrawler.fullname" . }}-playwright
  updatePolicy:
    updateMode: {{ .Values.verticalPodAutoscaler.updateMode | quote }}
  {{- with .Values.verticalPodAutoscaler.resourcePolicy }}
  resourcePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
