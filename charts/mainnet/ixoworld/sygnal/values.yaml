replicaCount: 1

strategy:
  type: Recreate

image:
  repository: matrixdotorg/sygnal
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: sygnal.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: sygnal-tls
  #    hosts:
  #      - sygnal.example.com

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Sygnal HTTP server configuration
http:
  # Addresses to bind to - use 0.0.0.0 to listen on all interfaces
  bind_addresses:
    - "0.0.0.0"
  port: 5000

# Logging configuration (Python dictConfig format)
log:
  setup:
    version: 1
    formatters:
      normal:
        format: "%(asctime)s [%(process)d] %(levelname)-5s %(name)s %(message)s"
    handlers:
      stdout:
        class: "logging.StreamHandler"
        formatter: "normal"
        stream: "ext://sys.stdout"
    loggers:
      sygnal.access:
        propagate: false
        handlers: ["stdout"]
        level: "INFO"
      sygnal:
        propagate: false
        handlers: ["stdout"]
    root:
      handlers: ["stdout"]
      level: "INFO"
    disable_existing_loggers: false
  access:
    # Set to true if behind a reverse proxy that sets X-Forwarded-For
    x_forwarded_for: true

# Prometheus metrics (optional)
metrics:
  prometheus:
    enabled: false
    address: "127.0.0.1"
    port: 8000

# Push applications
# Each key is the app_id registered in Element/Matrix clients.
# See https://github.com/element-hq/sygnal for full configuration options.
#
# Example FCM/Firebase (Android) app:
# apps:
#   im.vector.app:
#     type: gcm
#     api_version: v1
#     project_id: my-firebase-project
#     service_account_file: /sygnal/service_account.json
#
# Example APNs (iOS) app:
# apps:
#   com.example.myapp.ios:
#     type: apns
#     keyfile: /sygnal/my_key.p8
#     key_id: MY_KEY_ID
#     team_id: MY_TEAM_ID
#     topic: com.example.myapp
apps: {}

# Optional: outbound HTTPS proxy
# proxy: "http://user:secret@proxy:8080"
proxy: ""

# Database (PostgreSQL). Omit or set to null to run without a database.
database:
  name: postgres
  args:
    host: ""       # e.g. postgres.example.svc.cluster.local
    port: 5432
    user: ""
    password: ""   # or database.existingSecret
    database: ""
    sslmode: require   # require | disable | verify-full
  # Optional
  existingSecret: ""
  existingSecretPasswordKey: password

# Secret files to mount into the container (e.g. Firebase service account JSON, APNs key).
# Each key becomes a filename in the Secret; values are AVP-substituted base64 strings.
# Example:
# secretFiles:
#   service_account.json: <path:secret/data/sygnal#SERVICE_ACCOUNT_JSON>
#   apns_key.p8: <path:secret/data/sygnal#APNS_KEY>
secretFiles: {}

# Extra volumes to append to the pod spec (beyond the configmap and secretFiles volumes).
extraVolumes: []
# - name: my-volume
#   emptyDir: {}

# Extra volume mounts to append to the sygnal container (beyond the configmap mount).
extraVolumeMounts: []
# - name: my-volume
#   mountPath: /sygnal/extra
