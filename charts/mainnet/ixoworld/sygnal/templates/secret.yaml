{{- if .Values.secretFiles }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sygnal.fullname" . }}-files
  labels:
    {{- include "sygnal.labels" . | nindent 4 }}
# stringData accepts plain text; Kubernetes base64-encodes when storing.
# Use raw values from Vault/AVP (no base64 encoding needed).
stringData:
  {{- range $filename, $value := .Values.secretFiles }}
  {{ $filename }}: {{ $value | quote }}
  {{- end }}
{{- end }}
