{{- if and (index .Values "matrix-bridge-api" "enabled" | default false) (index .Values "matrix-bridge-api" "verticalPodAutoscaler" "enabled" | default false) }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "memory-engine-graphiti.matrixBridgeFullname" . }}
  labels:
    {{- include "memory-engine-graphiti.labels" . | nindent 4 }}
    app.kubernetes.io/component: matrix-bridge-api
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "memory-engine-graphiti.matrixBridgeFullname" . }}
  updatePolicy:
    updateMode: {{ index .Values "matrix-bridge-api" "verticalPodAutoscaler" "updateMode" | quote }}
  {{- with (index .Values "matrix-bridge-api" "verticalPodAutoscaler" "resourcePolicy") }}
  resourcePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
