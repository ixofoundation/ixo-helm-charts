apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ixo-matrix-appservice-rooms.fullname" . }}-config
  labels:
    {{- include "ixo-matrix-appservice-rooms.labels" . | nindent 4 }}
{{- $cfg := .Values.config | default dict }}
{{- $ecies := $cfg.ecies | default dict }}
{{- $userCreation := $cfg.userCreation | default dict }}
{{- $ucan := $cfg.ucan | default dict }}
{{- $restApi := $cfg.restApi | default dict }}
data:
  production.yaml: |-
    # Where the homeserver's Client-Server API is located. Typically this
    # is where clients would be connecting to in order to send messages.
    homeserverUrl: {{ $cfg.homeserverUrl | default "http://matrix-synapse.matrix-synapse.svc.cluster.local:8008" | quote }}
    homeserverName: {{ $cfg.homeserverName | default "mx.ixo.earth" | quote }}

    # Whether or not to autojoin rooms when invited.
    autoJoin: {{ if (hasKey $cfg "autoJoin") }}{{ $cfg.autoJoin }}{{ else }}true{{ end }}

    # Location on disk for where to store various bot information.
    dataPath: {{ $cfg.dataPath | default "./ixo-rooms-bot-storage" | quote }}

    # The blockchain API endpoint to query for DID documents
    blockchainRpcUri: {{ $cfg.blockchainRpcUri | default "https://impacthub.ixo.world/rpc/" | quote }}

    # The blocksync API endpoint to query for users DID documents using graphql
    blocksyncUri: {{ $cfg.blocksyncUri | default "https://blocksync-graphql.ixo.earth/" | quote }}

    # Network (devnet or testnet or mainnet)
    network: {{ $cfg.network | default "mainnet" | quote }}

    ecies:
      mnemonic: {{ $ecies.mnemonic | default "<path:ixo_core/data/matrix#MATRIX_APPSERVICE_ROOMS_ECIES_MNEMONIC>" }}

    userCreation:
      registrationToken: {{ $userCreation.registrationToken | default "<path:ixo_core/data/matrix#MATRIX_APPSERVICE_ROOMS_USER_CREATION_REGISTRATION_TOKEN>" }}

    # Recovery key for restoring encryption keys from server backup
    # Format: Base58 with spaces (e.g., "EsTc LW2K ...")
    recoveryKey: {{ $cfg.recoveryKey | default "<path:ixo_core/data/matrix#MATRIX_APPSERVICE_ROOMS_RECOVERY_KEY>" }}

    ucan:
      mnemonic: {{ $ucan.mnemonic | default "<path:ixo_core/data/matrix#MATRIX_ROOMS_BOT_DID_MNEMONIC>" }}
      hostname: {{ $ucan.hostname | default "rooms.bot.mx.ixo.earth" | quote }}

    # REST API config
    restApi:
      # Set to true to enable the REST API
      enabled: {{ if (hasKey $restApi "enabled") }}{{ $restApi.enabled }}{{ else }}true{{ end }}
      # Port to listen on for the REST API, default is 8080
      port: {{ $restApi.port | default 8081 }}
      # express trust proxy config for if you are using a reverse proxy
      trustProxy: {{ $restApi.trustProxy | default 1 }}
      # An access token for access to server rest endpoints.
      accessToken: {{ $restApi.accessToken | default "<path:ixo_core/data/matrix#MATRIX_APPSERVICE_ROOMS_ACCESS_TOKEN>" }}