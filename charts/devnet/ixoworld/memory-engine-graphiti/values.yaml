# Default values for ixo-cellnode.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
strategy:
  type: Recreate
image:
  repository: ghcr.io/ixoworld/memory-engine-graphiti-api-server
  pullPolicy: IfNotPresent
  tag: "main-4460b43"
containers:
  worker:
    image: ghcr.io/ixoworld/memory-engine-graphiti-community-worker
    resources: {}
  apiServer:
    image: ghcr.io/ixoworld/memory-engine-graphiti-api-server
    resources: {}
  mcpServer:
    image: ghcr.io/ixoworld/memory-engine-graphiti-mcp-server
    resources: {}
imagePullSecrets: []
env: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  portMcp: 8080
ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
ingressMcp:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
# VerticalPodAutoscaler (VPA) support for the main Deployment (worker/api-server/mcp-server containers).
# Requires the VPA CRDs/controller installed in the cluster:
# https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
# Disabled by default. When enabled with updateMode "Off" (the default), the VPA
# only produces resource recommendations (visible via `kubectl describe vpa`) and
# never mutates or evicts running pods.
verticalPodAutoscaler:
  enabled: false
  # "Off" = recommendations only (safe default). Other options: "Initial", "Recreate", "Auto".
  updateMode: "Off"
  # Optional per-container resource policies, e.g.:
  # resourcePolicy:
  #   containerPolicies:
  #     - containerName: 'api-server'
  #       minAllowed:
  #         cpu: 100m
  #         memory: 128Mi
  #       maxAllowed:
  #         cpu: 2
  #         memory: 4Gi
  resourcePolicy: {}
nodeSelector: {}
tolerations: []
affinity: {}
persistentVolume:
  # Mount path for main containers (MATRIX_BOT_STORE_PATH).
  mountPath: /storage/matrix_bot_store
  size: 40Gi
  accessModes:
  - ReadWriteOnce
  storageClass: vultr-block-storage-hdd
# Matrix Bridge API — runs as its own Deployment (not a sidecar). Has its own RWO PVC (main chart PVC is not shared).
# Subchart version: Chart.AppVersion in charts/matrix-bridge-api/Chart.yaml.
# Internal only; Graphiti calls it via MATRIX_BRIDGE_URL (ClusterIP service). No ingress.
matrix-bridge-api:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/ixoworld/memory-engine-graphiti #Todo refactor to ixoworld/memory-engine-graphiti/matrix-bridge-api
    pullPolicy: IfNotPresent
    # tag defaults to matrix-bridge-api subchart Chart.AppVersion
  port: 3100
  env: []
  resources: {}
  persistentVolume:
    mountPath: /storage/matrix_bridge_store
    size: 40Gi
    accessModes:
    - ReadWriteOnce
    storageClass: vultr-block-storage-hdd
  # VerticalPodAutoscaler (VPA) support for the matrix-bridge-api Deployment.
  # Disabled by default; "Off" updateMode only produces recommendations, never mutates pods.
  verticalPodAutoscaler:
    enabled: false
    updateMode: "Off"
    resourcePolicy: {}
# Sync a whole Vault KV path into a Secret (via external-secrets-operator) and
# expose every key as an env var through envFrom. Explicit env entries win on
# key collisions. Requires the "vault" ClusterSecretStore and reloader.
externalSecret:
  enabled: false
  vaultPath: ""
  refreshInterval: 1m
  storeName: vault
