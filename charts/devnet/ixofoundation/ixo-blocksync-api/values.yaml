# Default values for ixo-blocksync-api.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
image:
  repository: ghcr.io/ixofoundation/ixo-blocksync-api
  pullPolicy: IfNotPresent
  tag: v0.0.1
imagePullSecrets: []
env: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
# VerticalPodAutoscaler (VPA) support.
# Requires the VPA CRDs/controller installed in the cluster:
# https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
# Disabled by default. When enabled with updateMode "Off" (the default), the VPA
# only produces resource recommendations (visible via `kubectl describe vpa`) and
# never mutates or evicts running pods.
verticalPodAutoscaler:
  enabled: false
  # "Off" = recommendations only (safe default). Other options: "Initial", "Recreate", "Auto".
  updateMode: "Off"
  # Optional container resource policies, e.g.:
  # resourcePolicy:
  #   containerPolicies:
  #     - containerName: '*'
  #       minAllowed:
  #         cpu: 100m
  #         memory: 128Mi
  #       maxAllowed:
  #         cpu: 2
  #         memory: 4Gi
  resourcePolicy: {}
nodeSelector: {}
tolerations: []
affinity: {}
